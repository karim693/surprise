<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>🎉 Happy Birthday Jojo 🎉</title>
  <!-- Font Awesome Icons (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      background: linear-gradient(145deg, #0b0c1a 0%, #1a1e3a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
      color: white;
      touch-action: manipulation;
    }

    /* ---------- twinkling stars ---------- */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      background: transparent;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--duration) infinite alternate;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.9);
    }

    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.3); }
    }

    /* ---------- main card ---------- */
    .birthday-card {
      position: relative;
      z-index: 10;
      max-width: 820px;
      width: 94%;
      background: rgba(20, 25, 55, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 60px 60px 60px 60px;
      padding: 2.5rem 1.8rem 3rem;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(255, 215, 0, 0.2) inset;
      border: 1px solid rgba(255, 215, 0, 0.25);
      text-align: center;
      transition: 0.3s;
      animation: float 6s ease-in-out infinite;
      max-height: 98vh;
      overflow-y: auto;
      overscroll-behavior: contain;
    }

    @keyframes float {
      0% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-18px) rotate(0.5deg); }
      100% { transform: translateY(0px) rotate(0deg); }
    }

    .birthday-card:hover {
      box-shadow: 0 40px 80px rgba(255, 200, 0, 0.3), 0 0 0 3px #ffd966 inset;
    }

    /* ---------- emoji & title ---------- */
    .icon-big {
      font-size: 4.8rem;
      margin-bottom: 0.2rem;
      display: inline-block;
      filter: drop-shadow(0 10px 12px rgba(255, 200, 0, 0.5));
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    h1 {
      font-size: 4rem;
      font-weight: 800;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #feda75, #ffd700, #fdb931);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
      margin: 0.2rem 0 0.3rem;
      word-break: break-word;
    }

    .glow-text {
      font-size: 1.6rem;
      font-weight: 500;
      color: #f0e9d8;
      text-shadow: 0 0 15px #fbbf24, 0 0 30px #f59e0b;
      letter-spacing: 1px;
      margin-bottom: 0.4rem;
    }

    .sub-message {
      font-size: 1.1rem;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(4px);
      display: inline-block;
      padding: 0.5rem 1.8rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 215, 0, 0.3);
      margin: 0.4rem 0 0.8rem;
      color: #fde9c9;
    }

    .divider {
      width: 100px;
      height: 4px;
      background: linear-gradient(90deg, #fbbf24, #ffd966, #fbbf24);
      margin: 0.6rem auto 1.2rem;
      border-radius: 10px;
    }

    /* ---------- balloon row ---------- */
    .balloon-row {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin: 1rem 0 1.4rem;
    }

    .balloon {
      font-size: 3.2rem;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.5));
      transition: 0.25s;
      animation: bob 3s infinite alternate ease-in-out;
      cursor: pointer;
      touch-action: manipulation;
    }

    .balloon:nth-child(2) { animation-delay: 0.4s; }
    .balloon:nth-child(3) { animation-delay: 0.8s; }
    .balloon:nth-child(4) { animation-delay: 1.2s; }
    .balloon:nth-child(5) { animation-delay: 1.6s; }

    @keyframes bob {
      0% { transform: translateY(0px) rotate(-2deg); }
      100% { transform: translateY(-14px) rotate(2deg); }
    }

    .balloon:active {
      transform: scale(1.3);
      filter: drop-shadow(0 0 25px gold);
    }

    /* ---------- message board (special jojo love) ---------- */
    .message-box {
      background: rgba(10, 12, 30, 0.5);
      backdrop-filter: blur(4px);
      padding: 1rem 1.2rem;
      border-radius: 40px;
      border-left: 5px solid #ffd966;
      border-right: 5px solid #ffd966;
      margin: 0.6rem 0 1.2rem;
      font-size: 1.2rem;
      line-height: 1.6;
      color: #f5eedb;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .message-box i {
      color: #ffd966;
      margin: 0 6px;
    }

    .love-msg {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffb3ba, #ff6b8a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px rgba(255, 100, 150, 0.4);
      letter-spacing: 0.5px;
      display: block;
      margin: 0.3rem 0 0.1rem;
    }

    .powered {
      margin-top: 1rem;
      font-size: 1rem;
      color: #b9b3d1;
      letter-spacing: 1px;
      border-top: 1px dashed rgba(255, 215, 0, 0.2);
      padding-top: 0.8rem;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      touch-action: manipulation;
      cursor: default;
    }

    .powered i {
      color: #fbbf24;
    }

    .powered strong {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 900;
      font-size: 1.1rem;
    }

    .powered:active {
      opacity: 0.7;
    }

    /* ---------- age badge ---------- */
    .age-badge {
      display: inline-block;
      background: linear-gradient(145deg, #fbbf24, #f59e0b);
      padding: 0.35rem 1.8rem;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.4rem;
      color: #0b0c1a;
      box-shadow: 0 6px 0 #b45309;
      margin: 0.2rem 0 0.8rem;
      letter-spacing: 1px;
      border: 1px solid #ffe484;
    }

    /* ---------- confetti button ---------- */
    .confetti-btn {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      border: none;
      border-radius: 100px;
      padding: 0.9rem 2.5rem;
      font-weight: 700;
      font-size: 1.4rem;
      color: #0b0c1a;
      display: inline-flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 10px 0 #92400e, 0 10px 30px rgba(255, 200, 0, 0.4);
      transition: 0.08s linear;
      cursor: pointer;
      margin: 0.8rem 0 0.4rem;
      border: 1px solid #ffe484;
      letter-spacing: 1px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .confetti-btn:active {
      transform: translateY(7px);
      box-shadow: 0 3px 0 #92400e;
    }

    .confetti-btn i {
      font-size: 1.8rem;
    }

    /* ---------- music toggle (extra fun) ---------- */
    .music-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(20, 22, 50, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid #fbbf24;
      border-radius: 60px;
      padding: 0.7rem 1.2rem;
      color: #fde9c9;
      font-size: 1rem;
      z-index: 99;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
      transition: 0.2s;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .music-toggle:active {
      transform: scale(0.94);
    }

    .music-toggle i {
      font-size: 1.5rem;
      color: #fbbf24;
    }

    /* ---------- responsive fine-tune ---------- */
    @media (max-width: 600px) {
      .birthday-card {
        padding: 1.8rem 1rem 2.2rem;
        border-radius: 40px;
        width: 96%;
        max-height: 96vh;
      }
      h1 {
        font-size: 3.2rem;
      }
      .icon-big {
        font-size: 4rem;
      }
      .glow-text {
        font-size: 1.3rem;
      }
      .message-box {
        font-size: 1.05rem;
        padding: 0.9rem 1rem;
      }
      .confetti-btn {
        padding: 0.8rem 1.8rem;
        font-size: 1.2rem;
        gap: 12px;
      }
      .balloon {
        font-size: 2.8rem;
      }
      .music-toggle {
        bottom: 16px;
        right: 16px;
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
      }
      .love-msg {
        font-size: 1.3rem;
      }
      .age-badge {
        font-size: 1.2rem;
        padding: 0.3rem 1.4rem;
      }
      .powered {
        font-size: 0.9rem;
        gap: 6px;
      }
      .sub-message {
        font-size: 1rem;
        padding: 0.4rem 1.2rem;
      }
    }

    @media (max-width: 400px) {
      .birthday-card {
        padding: 1.2rem 0.8rem 1.8rem;
      }
      h1 {
        font-size: 2.6rem;
      }
      .balloon {
        font-size: 2.3rem;
      }
      .confetti-btn {
        font-size: 1rem;
        padding: 0.6rem 1.2rem;
        gap: 8px;
      }
      .message-box {
        font-size: 0.95rem;
      }
      .love-msg {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>

  <!-- TWINKLING STARS (generated by JS) -->
  <div class="stars" id="starfield"></div>

  <!-- MAIN BIRTHDAY CARD -->
  <div class="birthday-card" id="mainCard">
    <div class="icon-big">🎂</div>
    <h1>Jojo</h1>
    <div class="glow-text">✨ Happy Birthday ✨</div>
    <div class="sub-message">
      <i class="fas fa-crown" style="color: #fbbf24;"></i> 
      today is YOUR day 
      <i class="fas fa-crown" style="color: #fbbf24;"></i>
    </div>
    <div class="divider"></div>

    <!-- balloons row -->
    <div class="balloon-row">
      <span class="balloon" role="button" aria-label="balloon">🎈</span>
      <span class="balloon" role="button" aria-label="balloon">🎉</span>
      <span class="balloon" role="button" aria-label="balloon">🎈</span>
      <span class="balloon" role="button" aria-label="balloon">🎊</span>
      <span class="balloon" role="button" aria-label="balloon">🎈</span>
    </div>

    <!-- age badge (fun) -->
    <div class="age-badge">
      <i class="fas fa-gift" style="margin-right: 8px;"></i> 15 <span style="font-weight:400; font-size:1.1rem;">&nbsp;·&nbsp;</span> <i class="fas fa-star"></i>
    </div>

    <!-- ====== SPECIAL LOVE MESSAGE FOR JOJO ====== -->
    <div class="message-box">
      <i class="fas fa-quote-left"></i> 
      <span class="love-msg">
        <i class="fas fa-heart" style="color: #ff6b8a;"></i> 
        My love Jojo, you are my best Jojo in the world. 
        <i class="fas fa-heart" style="color: #ff6b8a;"></i>
      </span>
      <span style="display: block; margin-top: 0.3rem; font-size: 1.2rem;">
        This day is for you, my best Jojo in the world. 
        <i class="fas fa-infinity" style="color: #fbbf24;"></i>
      </span>
      <i class="fas fa-quote-right"></i>
    </div>

    <!-- confetti cannon -->
    <button class="confetti-btn" id="confettiTrigger">
      <i class="fas fa-hand-sparkles"></i> CELEBRATE <i class="fas fa-hand-sparkles"></i>
    </button>

    <!-- powered by karim (with extra love) -->
    <div class="powered" id="poweredByKarim">
      <i class="fas fa-bolt"></i> powered by <strong>Karim</strong> <i class="fas fa-crown" style="color: #fbbf24;"></i>
      <span style="opacity: 0.4; margin: 0 4px;">|</span>
      <i class="fas fa-music" style="color: #fbbf24;"></i> tap for music
    </div>

    <div style="margin-top: 0.3rem; font-size: 0.8rem; opacity: 0.5; letter-spacing: 0.3px;">
      <i class="fas fa-hand-peace"></i> tap balloons or title for confetti
    </div>
  </div>

  <!-- MUSIC TOGGLE (floating) -->
  <div class="music-toggle" id="musicToggle" role="button" aria-label="toggle music">
    <i class="fas fa-music" id="musicIcon"></i>
    <span id="musicLabel">play song</span>
  </div>

  <!-- ========== SCRIPTS ========== -->
  <script>
    (function() {
      "use strict";

      // ----- STARS GENERATION -----
      const starfield = document.getElementById('starfield');
      const STAR_COUNT = 150;
      for (let i = 0; i < STAR_COUNT; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 4.5 + 1.5;
        star.style.width = size + 'px';
        star.style.height = size + 'px';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
        star.style.animationDelay = (Math.random() * 5) + 's';
        star.style.opacity = Math.random() * 0.7 + 0.3;
        starfield.appendChild(star);
      }

      // ----- CONFETTI (canvas) -----
      const confettiButton = document.getElementById('confettiTrigger');
      let confettiActive = false;
      let animationFrame = null;

      function launchConfetti() {
        if (confettiActive) return;
        confettiActive = true;

        const canvas = document.createElement('canvas');
        canvas.id = 'confettiCanvas';
        canvas.style.position = 'fixed';
        canvas.style.top = '0';
        canvas.style.left = '0';
        canvas.style.width = '100%';
        canvas.style.height = '100%';
        canvas.style.pointerEvents = 'none';
        canvas.style.zIndex = '9999';
        document.body.appendChild(canvas);

        const ctx = canvas.getContext('2d');
        let W = window.innerWidth;
        let H = window.innerHeight;
        canvas.width = W;
        canvas.height = H;

        const pieces = [];
        const COLORS = ['#ffd966', '#f94144', '#f3722c', '#f8961e', '#90be6d', '#43aa8b', '#577590', '#f9c74f', '#9b5de5', '#f15bb5', '#ff6b8a', '#ffb3ba', '#00bbf9', '#fee440'];
        const PIECE_COUNT = 200;

        for (let i = 0; i < PIECE_COUNT; i++) {
          pieces.push({
            x: Math.random() * W,
            y: Math.random() * H - H * 0.2,
            w: Math.random() * 14 + 6,
            h: Math.random() * 9 + 4,
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            vx: (Math.random() - 0.5) * 9,
            vy: (Math.random() * 8 + 4),
            rot: Math.random() * 360,
            rotSpeed: (Math.random() - 0.5) * 16,
            life: 1.0,
            decay: 0.002 + Math.random() * 0.007,
          });
        }

        function drawConfetti() {
          ctx.clearRect(0, 0, W, H);
          let alive = false;
          for (let p of pieces) {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.09;
            p.rot += p.rotSpeed;
            p.life -= p.decay;
            if (p.life <= 0.05) continue;
            alive = true;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate((p.rot * Math.PI) / 180);
            ctx.globalAlpha = Math.min(p.life, 0.9);
            ctx.fillStyle = p.color;
            ctx.shadowColor = 'rgba(255,215,0,0.4)';
            ctx.shadowBlur = 14;
            ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
            ctx.restore();
          }

          if (!alive) {
            const c = document.getElementById('confettiCanvas');
            if (c) c.remove();
            confettiActive = false;
            if (animationFrame) cancelAnimationFrame(animationFrame);
            return;
          }
          animationFrame = requestAnimationFrame(drawConfetti);
        }

        drawConfetti();

        setTimeout(() => {
          if (confettiActive && document.getElementById('confettiCanvas')) {
            const c = document.getElementById('confettiCanvas');
            if (c) c.remove();
            confettiActive = false;
            if (animationFrame) cancelAnimationFrame(animationFrame);
          }
        }, 7500);
      }

      confettiButton.addEventListener('click', function(e) {
        e.preventDefault();
        launchConfetti();
        this.style.transform = 'scale(0.95)';
        setTimeout(() => { this.style.transform = ''; }, 120);
      });

      // also on touch (mobile)
      confettiButton.addEventListener('touchstart', function(e) {
        // just to ensure it works, but click handles it
      }, { passive: true });

      // ----- MUSIC TOGGLE (Web Audio) -----
      let audioCtx = null;
      let isPlaying = false;
      let musicInterval = null;
      const musicToggle = document.getElementById('musicToggle');
      const musicIcon = document.getElementById('musicIcon');
      const musicLabel = document.getElementById('musicLabel');

      const melody = [
        523.25, 523.25, 523.25, 587.33, 659.25, 659.25, 659.25, 587.33, 523.25, 523.25, 523.25, 523.25,
        493.88, 493.88, 493.88, 523.25, 523.25, 523.25, 523.25, 587.33, 659.25, 659.25, 659.25, 587.33,
        523.25, 523.25, 523.25, 523.25, 493.88, 493.88, 493.88, 523.25, 523.25, 523.25, 523.25,
        659.25, 659.25, 659.25, 659.25, 587.33, 523.25, 523.25, 523.25, 493.88, 493.88, 493.88
      ];
      const durations = [
        200, 200, 200, 200, 200, 200, 200, 200, 200, 200, 200, 200,
        200, 200, 200, 200, 200, 200, 200, 200, 200, 200, 200, 200,
        200, 200, 200, 200, 200, 200, 200, 200, 200, 200, 200, 200,
        200, 200, 200, 200, 200, 200, 200, 200, 200, 200
      ];

      function playTone(freq, duration, vol = 0.15) {
        if (!audioCtx) return;
        try {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'square';
          osc.frequency.value = freq;
          gain.gain.value = vol;
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration / 1000);
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start();
          osc.stop(audioCtx.currentTime + duration / 1000);
        } catch (_) { /* ignore */ }
      }

      function playBirthdayMelody() {
        if (!audioCtx) return;
        let index = 0;
        if (musicInterval) clearInterval(musicInterval);
        musicInterval = setInterval(() => {
          if (index >= melody.length) {
            clearInterval(musicInterval);
            musicInterval = null;
            return;
          }
          playTone(melody[index], durations[index], 0.13);
          index++;
        }, 210);
      }

      function stopMusic() {
        if (musicInterval) {
          clearInterval(musicInterval);
          musicInterval = null;
        }
        if (audioCtx && audioCtx.state === 'running') {
          audioCtx.close();
          audioCtx = null;
        }
        isPlaying = false;
        musicIcon.className = 'fas fa-music';
        musicLabel.innerText = 'play song';
      }

      function startMusic() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        isPlaying = true;
        musicIcon.className = 'fas fa-stop';
        musicLabel.innerText = 'stop';
        playBirthdayMelody();
      }

      musicToggle.addEventListener('click', function(e) {
        e.stopPropagation();
        if (isPlaying) {
          stopMusic();
        } else {
          startMusic();
        }
      });

      musicToggle.addEventListener('touchstart', function(e) {
        // just ensure touch works
      }, { passive: true });

      // cleanup
      window.addEventListener('beforeunload', function() {
        if (musicInterval) clearInterval(musicInterval);
        if (audioCtx) audioCtx.close();
      });

      // ----- EXTRA: click on balloons or title or powered launches confetti -----
      document.querySelectorAll('.balloon').forEach((b) => {
        b.addEventListener('click', function(e) {
          launchConfetti();
        });
        b.addEventListener('touchstart', function(e) {
          // prevent double fire
        }, { passive: true });
      });

      document.querySelector('h1')?.addEventListener('click', function() {
        launchConfetti();
      });

      document.querySelector('.love-msg')?.addEventListener('click', function() {
        launchConfetti();
      });

      document.getElementById('poweredByKarim')?.addEventListener('click', function() {
        launchConfetti();
      });

      // also if user taps on the card background (optional)
      document.getElementById('mainCard')?.addEventListener('click', function(e) {
        // avoid triggering on button or interactive elements
        if (e.target.closest('.confetti-btn') || e.target.closest('.music-toggle') || e.target.closest('.balloon')) return;
        launchConfetti();
      });

    })();
  </script>
</body>
</html>
